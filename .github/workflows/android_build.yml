name: Build ThermalFaker APK

# 触发条件：当代码推送到 main 分支时触发
on:
  push:
    branches: [ main ]
  # 也支持手动触发
  workflow_dispatch:

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      # Step 1: 签出代码
      - name: Checkout Code
        uses: actions/checkout@v4

      # Step 2: 设置 Java JDK
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # Step 3: 缓存 Gradle 依赖以加速构建
      - name: Cache Gradle Dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # Step 4: 授予 Gradle Wrapper 执行权限
      - name: Grant Execute Permission for Gradlew
        run: chmod +x gradlew

      # Step 5: 构建 Debug APK
      - name: Build Debug APK
        run: ./gradlew assembleDebug

      # Step 6: 获取当前日期和时间用于版本号
      - name: Get Current Date
        id: date
        run: echo "::set-output name=date::$(date +'%Y%m%d_%H%M%S')"

      # Step 7: 上传 APK 作为 Artifact
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ThermalFaker_Debug_APK_${{ steps.date.outputs.date }}
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30  # 保留 30 天
